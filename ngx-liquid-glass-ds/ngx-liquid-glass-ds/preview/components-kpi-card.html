<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>KPI card · featured + regular</title>
<link rel="stylesheet" href="../tokens-brand.css"/>
<link rel="stylesheet" href="../tokens-lg.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #04021A; }
  body {
    padding: 24px;
    color: var(--ngx-white);
    font-family: var(--font-text);
    min-height: 280px;
    background:
      radial-gradient(40% 60% at 80% 10%, rgba(109,0,255,0.18) 0%, transparent 60%),
      radial-gradient(30% 40% at 10% 95%, rgba(109,0,255,0.12) 0%, transparent 60%),
      #04021A;
    position: relative;
  }
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("../assets/textures/texture-pattern-navy.png");
    background-size: 280px; opacity: 0.05;
    mix-blend-mode: screen; pointer-events: none;
  }
  body > * { position: relative; z-index: 1; }
  .card-label {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9.5px; letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ngx-purple-300);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-label::before {
    content: ""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--ngx-purple); box-shadow: 0 0 8px var(--ngx-purple);
  }
  .demo-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .demo-col { display: flex; flex-direction: column; gap: 12px; }
  .note { font-size: 11px; color: var(--ngx-gray-400); margin-top: 12px; line-height: 1.5; }
  .swatch-note {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ngx-gray-400);
  }
</style></head>
<body>

<div class="card-label">KPI CARD</div>
<div style="display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 12px;">
  <div class="ngx-kpi ngx-kpi--feat">
    <div class="ngx-kpi__head"><span class="ngx-kpi__l">Recovery</span><span class="ngx-kpi__chip">Ready to push</span></div>
    <div class="ngx-kpi__v">79<span class="u">%</span></div>
    <div class="ngx-kpi__foot"><span class="ngx-kpi__d up">▲ +12 vs 7d</span><span class="ngx-kpi__base">Baseline 67%</span></div>
  </div>
  <div class="ngx-kpi">
    <div class="ngx-kpi__head"><span class="ngx-kpi__l">HRV</span><span class="ngx-kpi__chip">Whoop</span></div>
    <div class="ngx-kpi__v">52<span class="u">ms</span></div>
    <div class="ngx-kpi__foot"><span class="ngx-kpi__d up">▲ +8</span><span class="ngx-kpi__base">44 · 30d</span></div>
  </div>
  <div class="ngx-kpi">
    <div class="ngx-kpi__head"><span class="ngx-kpi__l">RHR</span><span class="ngx-kpi__chip">Apple</span></div>
    <div class="ngx-kpi__v">44<span class="u">bpm</span></div>
    <div class="ngx-kpi__foot"><span class="ngx-kpi__d up">▼ −2</span><span class="ngx-kpi__base">46 · 30d</span></div>
  </div>
</div>
<div class="note">One featured tile per row (max). Featured = <code>.ngx-kpi--feat</code> · purple-glass with halo + bigger number. Regular = neutral glass with chip tag.</div>

</body></html>
