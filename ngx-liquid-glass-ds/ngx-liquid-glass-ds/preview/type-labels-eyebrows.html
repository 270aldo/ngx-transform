<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Eyebrows + labels · CAPS micro</title>
<link rel="stylesheet" href="../tokens-brand.css"/>
<link rel="stylesheet" href="../tokens-lg.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #04021A; }
  body {
    padding: 24px;
    color: var(--ngx-white);
    font-family: var(--font-text);
    min-height: 280px;
    background:
      radial-gradient(40% 60% at 80% 10%, rgba(109,0,255,0.18) 0%, transparent 60%),
      radial-gradient(30% 40% at 10% 95%, rgba(109,0,255,0.12) 0%, transparent 60%),
      #04021A;
    position: relative;
  }
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("../assets/textures/texture-pattern-navy.png");
    background-size: 280px; opacity: 0.05;
    mix-blend-mode: screen; pointer-events: none;
  }
  body > * { position: relative; z-index: 1; }
  .card-label {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9.5px; letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ngx-purple-300);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-label::before {
    content: ""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--ngx-purple); box-shadow: 0 0 8px var(--ngx-purple);
  }
  .demo-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .demo-col { display: flex; flex-direction: column; gap: 12px; }
  .note { font-size: 11px; color: var(--ngx-gray-400); margin-top: 12px; line-height: 1.5; }
  .swatch-note {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ngx-gray-400);
  }
</style></head>
<body>

<div class="card-label">EYEBROWS · LABELS</div>
<div class="demo-col">
  <div>
    <span style="font-family: var(--font-display); font-weight: 700; font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ngx-purple-300);">● Roster · Q2-26 · Wk 6</span>
    <div style="font-family: var(--font-display); font-weight: 900; font-size: 28px; letter-spacing: -0.015em; text-transform: uppercase; margin-top: 6px;">Athletes <span style="color: rgba(255,255,255,0.5);">/ 18</span></div>
  </div>
  <div class="demo-row">
    <span style="font-family: var(--font-display); font-weight: 700; font-size: 9.5px; letter-spacing: 0.20em; text-transform: uppercase; color: rgba(255,255,255,0.32);">Workspace</span>
    <span style="font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ngx-gray-400);">Recovery</span>
    <span style="font-family: var(--font-display); font-weight: 800; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ngx-purple-300); padding: 4px 8px; border-radius: 999px; background: var(--lg-glass-purple-soft); border: 1px solid var(--lg-rim-purple);">Strength · Wk 06</span>
  </div>
</div>
<div class="note">10–11px · letter-spacing 0.14–0.22em · ALL CAPS. Tighter tracking = stronger label. Eyebrow leads every section.</div>

</body></html>
