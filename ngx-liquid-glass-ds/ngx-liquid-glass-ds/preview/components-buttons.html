<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Buttons · primary / secondary / ghost</title>
<link rel="stylesheet" href="../tokens-brand.css"/>
<link rel="stylesheet" href="../tokens-lg.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #04021A; }
  body {
    padding: 24px; color: var(--ngx-white); font-family: var(--font-text);
    min-height: 280px;
    background:
      radial-gradient(40% 60% at 80% 10%, rgba(109,0,255,0.18) 0%, transparent 60%),
      radial-gradient(30% 40% at 10% 95%, rgba(109,0,255,0.12) 0%, transparent 60%),
      #04021A;
    position: relative;
  }
  body::before {
    content:""; position:absolute; inset:0;
    background-image: url("../assets/textures/texture-pattern-navy.png");
    background-size: 280px; opacity: 0.05; mix-blend-mode: screen; pointer-events:none;
  }
  body > * { position: relative; z-index: 1; }
  .card-label {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9.5px; letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ngx-purple-300);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .card-label::before { content:""; width:5px; height:5px; border-radius:50%; background: var(--ngx-purple); box-shadow: 0 0 8px var(--ngx-purple); }
  .demo-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .note { font-size: 11px; color: var(--ngx-gray-400); margin-top: 14px; line-height: 1.5; }
  .swatch-note { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ngx-gray-400); }
  .sw { width: 64px; height: 64px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); display: flex; align-items: flex-end; padding: 4px; box-sizing: border-box; font-family: var(--font-display); font-size: 8px; letter-spacing: .08em; color: var(--ngx-white); }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
</style></head>
<body>

<style>
  .btn-row { display:flex; gap:12px; flex-wrap: wrap; align-items:center; }
  .btn { padding: 12px 22px; border-radius: 4px; font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 0.10em; text-transform: uppercase; cursor: pointer; border: 0; transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1); }
  .btn-primary { background: var(--ngx-purple); color: #fff; box-shadow: 0 0 18px rgba(109,0,255,0.5); }
  .btn-primary:hover { background: #8530FF; box-shadow: 0 0 26px rgba(109,0,255,0.7); }
  .btn-secondary { background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.18); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); }
  .btn-secondary:hover { background: rgba(255,255,255,0.10); }
  .btn-ghost { background: transparent; color: var(--ngx-gray-300); border: 1px solid rgba(255,255,255,0.10); }
  .btn-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.22); }
  .btn-icon { display:inline-flex; align-items:center; gap:8px; }
</style>
<div class="card-label">CTAS</div>
<div class="btn-row">
  <button class="btn btn-primary btn-icon">Start session <span>→</span></button>
  <button class="btn btn-secondary">See plan</button>
  <button class="btn btn-ghost">Skip</button>
</div>
<div class="note">One primary per composition (purple charge). Secondary = glass translucent on dark. Ghost = de-emphasized. Sharp 4px corners. No shadow on secondary/ghost.</div>

</body></html>
