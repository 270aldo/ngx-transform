<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Voice · data → interpretation → action</title>
<link rel="stylesheet" href="../tokens-brand.css"/>
<link rel="stylesheet" href="../tokens-lg.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #04021A; }
  body {
    padding: 24px;
    color: var(--ngx-white);
    font-family: var(--font-text);
    min-height: 280px;
    background:
      radial-gradient(40% 60% at 80% 10%, rgba(109,0,255,0.18) 0%, transparent 60%),
      radial-gradient(30% 40% at 10% 95%, rgba(109,0,255,0.12) 0%, transparent 60%),
      #04021A;
    position: relative;
  }
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("../assets/textures/texture-pattern-navy.png");
    background-size: 280px; opacity: 0.05;
    mix-blend-mode: screen; pointer-events: none;
  }
  body > * { position: relative; z-index: 1; }
  .card-label {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9.5px; letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ngx-purple-300);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-label::before {
    content: ""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--ngx-purple); box-shadow: 0 0 8px var(--ngx-purple);
  }
  .demo-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .demo-col { display: flex; flex-direction: column; gap: 12px; }
  .note { font-size: 11px; color: var(--ngx-gray-400); margin-top: 12px; line-height: 1.5; }
  .swatch-note {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ngx-gray-400);
  }
</style></head>
<body>

<div class="card-label">VOICE FORMULA</div>
<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
  <div class="lg-glass" style="padding: 14px; border-radius: 12px;">
    <div class="swatch-note" style="margin-bottom: 6px;">01 · DATA</div>
    <div style="font-family: var(--font-display); font-weight: 900; font-size: 22px; letter-spacing: -0.025em; font-variant-numeric: tabular-nums;">52 ms HRV</div>
  </div>
  <div class="lg-glass" style="padding: 14px; border-radius: 12px;">
    <div class="swatch-note" style="margin-bottom: 6px;">02 · INTERPRETATION</div>
    <div style="font-family: var(--font-text); font-size: 13px; line-height: 1.4;">+8 ms <b>sobre baseline</b> (44 ms · 30d).</div>
  </div>
  <div class="lg-glass lg-glass--purple" style="padding: 14px; border-radius: 12px;">
    <div class="swatch-note" style="margin-bottom: 6px; color: var(--ngx-purple-200);">03 · ACTION</div>
    <div style="font-family: var(--font-text); font-size: 13px; line-height: 1.4; color: var(--ngx-white);"><b>Hoy puedes empujar.</b></div>
  </div>
</div>
<div class="note">3 clauses, in this order. Drop the small-talk. Spanish or English equally.</div>

</body></html>
