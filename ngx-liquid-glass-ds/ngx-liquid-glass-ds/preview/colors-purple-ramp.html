<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Purple ramp · 100 → 700</title>
<link rel="stylesheet" href="../tokens-brand.css"/>
<link rel="stylesheet" href="../tokens-lg.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #04021A; }
  body {
    padding: 24px;
    color: var(--ngx-white);
    font-family: var(--font-text);
    min-height: 280px;
    background:
      radial-gradient(40% 60% at 80% 10%, rgba(109,0,255,0.18) 0%, transparent 60%),
      radial-gradient(30% 40% at 10% 95%, rgba(109,0,255,0.12) 0%, transparent 60%),
      #04021A;
    position: relative;
  }
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("../assets/textures/texture-pattern-navy.png");
    background-size: 280px; opacity: 0.05;
    mix-blend-mode: screen; pointer-events: none;
  }
  body > * { position: relative; z-index: 1; }
  .card-label {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9.5px; letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ngx-purple-300);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-label::before {
    content: ""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--ngx-purple); box-shadow: 0 0 8px var(--ngx-purple);
  }
  .demo-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .demo-col { display: flex; flex-direction: column; gap: 12px; }
  .note { font-size: 11px; color: var(--ngx-gray-400); margin-top: 12px; line-height: 1.5; }
  .swatch-note {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ngx-gray-400);
  }
</style></head>
<body>

<div class="card-label">PURPLE RAMP</div>
<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;">
  <div style="background: var(--ngx-purple-100); height: 56px; border-radius: 8px;"></div>
  <div style="background: var(--ngx-purple-200); height: 56px; border-radius: 8px;"></div>
  <div style="background: var(--ngx-purple-300); height: 56px; border-radius: 8px;"></div>
  <div style="background: var(--ngx-purple-400); height: 56px; border-radius: 8px;"></div>
  <div style="background: var(--ngx-purple-500); height: 56px; border-radius: 8px;"></div>
  <div style="background: var(--ngx-purple); height: 56px; border-radius: 8px; box-shadow: 0 0 14px rgba(109,0,255,0.55); outline: 1px solid white;"></div>
  <div style="background: var(--ngx-purple-700); height: 56px; border-radius: 8px;"></div>
</div>
<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 6px;">
  <span class="swatch-note">100</span><span class="swatch-note">200</span><span class="swatch-note">300</span><span class="swatch-note">400</span><span class="swatch-note">500</span><span class="swatch-note" style="color: var(--ngx-purple-200);">★ 600</span><span class="swatch-note">700</span>
</div>
<div class="note">Canonical purple = 600 (#6D00FF). Don't shift to lighter tones "for contrast on dark" — the brand rule is the standout stays canonical hex.</div>

</body></html>
