<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Motion · easing + durations</title>
<link rel="stylesheet" href="../tokens-brand.css"/>
<link rel="stylesheet" href="../tokens-lg.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #04021A; }
  body {
    padding: 24px; color: var(--ngx-white); font-family: var(--font-text);
    min-height: 280px;
    background:
      radial-gradient(40% 60% at 80% 10%, rgba(109,0,255,0.18) 0%, transparent 60%),
      radial-gradient(30% 40% at 10% 95%, rgba(109,0,255,0.12) 0%, transparent 60%),
      #04021A;
    position: relative;
  }
  body::before {
    content:""; position:absolute; inset:0;
    background-image: url("../assets/textures/texture-pattern-navy.png");
    background-size: 280px; opacity: 0.05; mix-blend-mode: screen; pointer-events:none;
  }
  body > * { position: relative; z-index: 1; }
  .card-label {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9.5px; letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ngx-purple-300);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .card-label::before { content:""; width:5px; height:5px; border-radius:50%; background: var(--ngx-purple); box-shadow: 0 0 8px var(--ngx-purple); }
  .demo-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .note { font-size: 11px; color: var(--ngx-gray-400); margin-top: 14px; line-height: 1.5; }
  .swatch-note { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ngx-gray-400); }
  .sw { width: 64px; height: 64px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); display: flex; align-items: flex-end; padding: 4px; box-sizing: border-box; font-family: var(--font-display); font-size: 8px; letter-spacing: .08em; color: var(--ngx-white); }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
</style></head>
<body>

<style>
  .ease-row { display:flex; gap: 12px; align-items: center; margin-bottom: 12px; }
  .ease-label { font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; width: 110px; color: var(--ngx-gray-300); }
  .ease-track { flex:1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 999px; position: relative; overflow: hidden; }
  .ease-dot { position:absolute; top:-7px; left: 0; width: 20px; height: 20px; border-radius: 50%; background: var(--ngx-purple); box-shadow: 0 0 12px rgba(109,0,255,0.7); }
  @keyframes mv-out { 0%,15%{left:0} 70%,100%{left: calc(100% - 20px)} }
  @keyframes mv-in { 0%,15%{left:0} 70%,100%{left: calc(100% - 20px)} }
  @keyframes mv-std { 0%,15%{left:0} 70%,100%{left: calc(100% - 20px)} }
  .out .ease-dot { animation: mv-out 2.4s cubic-bezier(0.22, 1, 0.36, 1) infinite; }
  .in .ease-dot { animation: mv-in 2.4s cubic-bezier(0.55, 0, 1, 0.45) infinite; }
  .std .ease-dot { animation: mv-std 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
</style>
<div class="card-label">MOTION</div>
<div class="ease-row out"><div class="ease-label">Ease-out</div><div class="ease-track"><div class="ease-dot"></div></div></div>
<div class="ease-row in"><div class="ease-label">Ease-in</div><div class="ease-track"><div class="ease-dot"></div></div></div>
<div class="ease-row std"><div class="ease-label">Standard</div><div class="ease-track"><div class="ease-dot"></div></div></div>
<div class="note">Durations cluster at <b>120ms / 200ms / 360ms</b>. Entrances use <code>--ease-out</code>. Exits use <code>--ease-in</code>. No bounce, no spring — NGX is a stopwatch.</div>

</body></html>
