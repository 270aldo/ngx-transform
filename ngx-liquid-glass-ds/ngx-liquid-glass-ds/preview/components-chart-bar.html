<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Bar chart · HRV pattern with optimal band</title>
<link rel="stylesheet" href="../tokens-brand.css"/>
<link rel="stylesheet" href="../tokens-lg.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #04021A; }
  body {
    padding: 24px;
    color: var(--ngx-white);
    font-family: var(--font-text);
    min-height: 280px;
    background:
      radial-gradient(40% 60% at 80% 10%, rgba(109,0,255,0.18) 0%, transparent 60%),
      radial-gradient(30% 40% at 10% 95%, rgba(109,0,255,0.12) 0%, transparent 60%),
      #04021A;
    position: relative;
  }
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("../assets/textures/texture-pattern-navy.png");
    background-size: 280px; opacity: 0.05;
    mix-blend-mode: screen; pointer-events: none;
  }
  body > * { position: relative; z-index: 1; }
  .card-label {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9.5px; letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ngx-purple-300);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-label::before {
    content: ""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--ngx-purple); box-shadow: 0 0 8px var(--ngx-purple);
  }
  .demo-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .demo-col { display: flex; flex-direction: column; gap: 12px; }
  .note { font-size: 11px; color: var(--ngx-gray-400); margin-top: 12px; line-height: 1.5; }
  .swatch-note {
    font-family: var(--font-display); font-weight: 700;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ngx-gray-400);
  }
</style></head>
<body>

<div class="card-label">BAR CHART</div>
<div class="ngx-card" style="padding: 16px;">
  <div class="ngx-card__head-l" style="margin-bottom: 12px;"><span class="dot"></span>HRV · 14 days</div>
  <div class="ngx-chart" style="height: 140px;">
    <div class="ngx-chart__y"><span>70</span><span>50</span><span>30</span></div>
    <div class="ngx-chart__plot">
      <div class="ngx-chart__grid"><div></div><div></div><div></div></div>
      <div class="ngx-chart__band"><span class="ngx-chart__band-lbl">Optimal 48–60</span></div>
      <div class="ngx-chart__bars">
        <div class="ngx-chart__col"><div class="ngx-bar ngx-bar--lt" style="height:40%"></div></div>
        <div class="ngx-chart__col"><div class="ngx-bar" style="height:55%"></div></div>
        <div class="ngx-chart__col"><div class="ngx-bar ngx-bar--warn" style="height:32%"></div></div>
        <div class="ngx-chart__col"><div class="ngx-bar" style="height:62%"></div></div>
        <div class="ngx-chart__col"><div class="ngx-bar" style="height:58%"></div></div>
        <div class="ngx-chart__col"><div class="ngx-bar ngx-bar--lt" style="height:46%"></div></div>
        <div class="ngx-chart__col"><div class="ngx-bar" style="height:70%"></div></div>
        <div class="ngx-chart__col"><div class="ngx-bar" style="height:74%"></div></div>
        <div class="ngx-chart__col"><div class="ngx-bar" style="height:80%"></div></div>
        <div class="ngx-chart__col"><div class="ngx-bar" style="height:86%"></div></div>
      </div>
    </div>
  </div>
</div>
<div class="note">Bars: gradient purple→light purple with subtle glow. Lighter bars = below optimal band. Warn bars (amber) = bad days. Dashed band = optimal zone with purple pill label.</div>

</body></html>
